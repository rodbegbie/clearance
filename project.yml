name: Clearance
options:
  bundleIdPrefix: com.jesse
  deploymentTarget:
    macOS: 14.0
packages:
  Yams:
    url: https://github.com/jpsim/Yams
    from: 5.1.0
  Down:
    url: https://github.com/johnxnguyen/Down
    from: 0.11.0
targets:
  Clearance:
    type: application
    platform: macOS
    sources:
      - path: Clearance
        excludes:
          - Resources/Assets.xcassets
    resources:
      - path: Clearance/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jesse.Clearance
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Clearance
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        SWIFT_VERSION: 6.0
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Yams
      - package: Down
  ClearanceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClearanceTests
    dependencies:
      - target: Clearance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jesse.ClearanceTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 6.0
schemes:
  Clearance:
    build:
      targets:
        Clearance: all
        ClearanceTests: [test]
    test:
      targets:
        - name: ClearanceTests
