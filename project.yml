name: Clearance
options:
  bundleIdPrefix: com.jesse
  deploymentTarget:
    macOS: 14.0
packages:
  Yams:
    url: https://github.com/jpsim/Yams
    from: 5.1.0
  Markdown:
    url: https://github.com/swiftlang/swift-markdown
    from: 0.7.3
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0
targets:
  Clearance:
    type: application
    platform: macOS
    sources:
      - path: Clearance
      - path: CHANGELOG.md
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jesse.Clearance
        INFOPLIST_FILE: Clearance/App/Info.plist
        SWIFT_VERSION: 6.0
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: 1.2.4
        CURRENT_PROJECT_VERSION: 9
        SPARKLE_FEED_URL: ""
        SPARKLE_PUBLIC_ED_KEY: ""
    dependencies:
      - package: Yams
      - package: Markdown
      - package: Sparkle
      - target: ClearanceCLI
        link: false
        embed: true
        copy:
          destination: wrapper
          subpath: Contents/Helpers
  ClearanceCLI:
    type: tool
    platform: macOS
    sources:
      - path: ClearanceCLI
      - path: Clearance/Services/ClearanceCommandLineTool.swift
      - path: Clearance/Services/FileIO.swift
      - path: Clearance/Services/NewMarkdownDocument.swift
    settings:
      base:
        PRODUCT_NAME: clearance
        SWIFT_VERSION: 6.0
  ClearanceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClearanceTests
    dependencies:
      - target: Clearance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jesse.ClearanceTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 6.0
schemes:
  Clearance:
    build:
      targets:
        Clearance: all
        ClearanceTests: [test]
    run:
      config: Debug
      executable: Clearance
    test:
      config: Debug
      targets:
        - name: ClearanceTests
